name: Continuous Integration

on:
  push:
    branches: [ main ]

jobs:
  quality-gate:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20' # Matches modern Next.js environments
          cache: 'npm'    # Automatically caches your node_modules for faster builds

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run TypeScript Typecheck
        run: npm run build --dry-run || npx tsc --noEmit

      - name: Run Vitest Unit & Integration Tests
        run: npm run test -- --watch=false --run